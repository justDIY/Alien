<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── Layout constants ──────────────────────────────────────────────
const COL_W = 300;
const COL_GAP = 150;
const COL_STARTS = [0,1,2,3].map(i => 30 + i*(COL_W+COL_GAP));
const COL_CENTERS = COL_STARTS.map(s => s + COL_W/2);
// [180, 630, 1080, 1530]
const CONTRIB_X = 30 + 4*(COL_W+COL_GAP);
const CONTRIB_CX = CONTRIB_X + 165;
const HEADER_Y = 52;
const HEADER_H = 60;
const PAPERS_START = HEADER_Y + HEADER_H + 18;
const CORE_H = 88;
const STRONG_H = 74;
const BG_H = 64;
const CARD_GAP = 7;
const TIER_GAP = 16;
const CANVAS_W = CONTRIB_X + 360;

const { BLOCKS, CROSS_LINKS, BLOCK_ARROWS } = window.MINDMAP_DATA;

// ── Compute paper positions ────────────────────────────────────────
function computePositions(showBgMap) {
  const pos = {};
  const colHeights = {};
  BLOCKS.forEach((block, bi) => {
    const cx = COL_CENTERS[bi];
    let y = PAPERS_START;
    ['core','strong','background'].forEach(tier => {
      const papers = block.papers.filter(p => p.tier === tier);
      if (!papers.length) return;
      const h = tier === 'core' ? CORE_H : tier === 'strong' ? STRONG_H : BG_H;
      const showBg = showBgMap[block.id];
      const visible = tier !== 'background' || showBg;
      papers.forEach(paper => {
        pos[paper.id] = { x: cx, y: y + h/2, blockIdx: bi, visible: visible || tier !== 'background' };
        if (visible) y += h + CARD_GAP;
      });
      if (visible) y += TIER_GAP;
    });
    colHeights[block.id] = y;
  });
  pos['CONTRIB'] = { x: CONTRIB_CX, y: HEADER_Y + 240, blockIdx: 4 };
  return { pos, colHeights };
}

// ── SVG connections ────────────────────────────────────────────────
function Connections({ pos, showBg }) {
  const arrows = [];

  // Block-to-block main arrows (between headers)
  const arrowY = HEADER_Y + HEADER_H / 2;
  BLOCK_ARROWS.forEach((arrow, i) => {
    const x1 = COL_STARTS[i] + COL_W + 2;
    const x2 = i < 3 ? COL_STARTS[i+1] - 2 : CONTRIB_X - 2;
    const mx = (x1 + x2) / 2;
    const my = arrowY - 22;
    arrows.push(
      <g key={`main-${i}`}>
        <defs>
          <marker id={`arr-${i}`} markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="rgba(255,255,255,0.5)" />
          </marker>
        </defs>
        <line x1={x1} y1={arrowY} x2={x2} y2={arrowY}
          stroke="rgba(255,255,255,0.28)" strokeWidth="1.5"
          markerEnd={`url(#arr-${i})`} />
        <text x={mx} y={my} textAnchor="middle"
          fill="rgba(255,255,255,0.42)" fontSize="8.5" fontStyle="italic"
          fontFamily="Georgia, serif">
          {arrow.label.length > 60 ? arrow.label.slice(0,57)+'…' : arrow.label}
        </text>
      </g>
    );
  });

  // Cross-block dashed amber links
  CROSS_LINKS.forEach((link, i) => {
    const fromPos = pos[link.from];
    const toPos = pos[link.to];
    if (!fromPos || !toPos) return;

    const x1 = COL_STARTS[fromPos.blockIdx] + COL_W;
    const y1 = fromPos.y;
    const x2 = toPos.blockIdx === 4 ? CONTRIB_X : COL_STARTS[toPos.blockIdx];
    const y2 = toPos.y;
    const cp1x = x1 + (x2 - x1) * 0.4;
    const cp1y = y1 - 35;
    const cp2x = x1 + (x2 - x1) * 0.6;
    const cp2y = y2 - 35;
    const d = `M ${x1} ${y1} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${y2}`;
    const midT = 0.5;
    const mx = cp1x * 0.25 + cp2x * 0.25 + x1 * 0.125 + x2 * 0.125 + (cp1x+cp2x)*0.125;
    const my2 = y1 * 0.5 + y2 * 0.5 - 40;

    arrows.push(
      <g key={`cross-${i}`} opacity="0.8">
        <defs>
          <marker id={`xarr-${i}`} markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
            <polygon points="0 0, 7 2.5, 0 5" fill="#FFA500" />
          </marker>
        </defs>
        <path d={d} fill="none" stroke="#FFA500" strokeWidth="1.3"
          strokeDasharray="5,4" markerEnd={`url(#xarr-${i})`} opacity="0.7" />
        <text x={(x1+x2)/2} y={my2} textAnchor="middle"
          fill="#FFA500" fontSize="8" fontStyle="italic" fontFamily="Georgia, serif" opacity="0.8">
          {link.label}
        </text>
      </g>
    );
  });

  return <g>{arrows}</g>;
}

// ── Paper card ─────────────────────────────────────────────────────
function PaperCard({ paper, block, onSelect, style }) {
  const isCore = paper.tier === 'core';
  const isStrong = paper.tier === 'strong';
  const h = isCore ? CORE_H : isStrong ? STRONG_H : BG_H;
  return (
    <div
      className={`paper-card ${paper.tier} ${isCore ? 'gold-glow' : ''}`}
      onClick={() => onSelect({ paper, block })}
      style={{
        height: h,
        background: block.cardColor,
        borderColor: isCore ? block.borderColor : 'rgba(255,255,255,0.08)',
        boxShadow: isCore
          ? `0 0 0 1.5px #B8860B44, 0 3px 14px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04)`
          : `0 2px 8px rgba(0,0,0,0.35)`,
        ...style,
      }}
    >
      <div className="paper-icon">
        <span>📄</span>
        {paper.star && <span className="paper-star">{paper.star}</span>}
      </div>
      <div className="paper-title" style={{ fontSize: isCore ? 11 : 10.5 }}>
        {paper.title}
      </div>
      <div className="paper-meta">
        {paper.authors}, {paper.year} · <em>{paper.journal}</em>
      </div>
    </div>
  );
}

// ── Block column ───────────────────────────────────────────────────
function BlockColumn({ block, colIdx, onSelect, showBg, onToggleBg, topY }) {
  const left = COL_STARTS[colIdx];
  const corePapers = block.papers.filter(p => p.tier === 'core');
  const strongPapers = block.papers.filter(p => p.tier === 'strong');
  const bgPapers = block.papers.filter(p => p.tier === 'background');

  let cardY = PAPERS_START;
  const coreH = CORE_H + CARD_GAP;
  const strongH = STRONG_H + CARD_GAP;
  const bgH = BG_H + CARD_GAP;

  const coreItems = corePapers.map((p, i) => {
    const y = cardY + i * coreH;
    return { paper: p, y };
  });
  cardY += corePapers.length * coreH + TIER_GAP;

  const strongItems = strongPapers.map((p, i) => {
    const y = cardY + i * strongH;
    return { paper: p, y };
  });
  cardY += strongPapers.length * strongH + TIER_GAP;

  const bgItems = bgPapers.map((p, i) => {
    const y = cardY + i * bgH;
    return { paper: p, y };
  });
  const toggleY = cardY;

  return (
    <div className="block-col" style={{ left, top: topY || 0 }}>
      {/* Header */}
      <div
        className="block-header"
        style={{
          position: 'absolute', top: HEADER_Y, left: 0,
          background: `linear-gradient(135deg, ${block.color}, ${block.color}cc)`,
          boxShadow: `0 4px 20px ${block.color}55, inset 0 1px 0 rgba(255,255,255,0.1)`,
        }}
      >
        <div className="block-header-title">{block.title}</div>
        <div className="block-header-sub">{block.subtitle}</div>
      </div>

      {/* Core papers */}
      {coreItems.map(({ paper, y }) => (
        <div key={paper.id} style={{ position: 'absolute', top: y, left: 0 }}>
          <PaperCard paper={paper} block={block} onSelect={onSelect} />
        </div>
      ))}

      {/* Section label for strong */}
      {strongPapers.length > 0 && (
        <div style={{
          position: 'absolute',
          top: PAPERS_START + corePapers.length * coreH + 4,
          left: 0, width: COL_W,
          fontSize: 8, color: 'rgba(255,255,255,0.28)', textTransform: 'uppercase',
          letterSpacing: '0.1em', fontWeight: 700
        }}>
          Strongly Relevant
        </div>
      )}

      {/* Strong papers */}
      {strongItems.map(({ paper, y }) => (
        <div key={paper.id} style={{ position: 'absolute', top: y, left: 0 }}>
          <PaperCard paper={paper} block={block} onSelect={onSelect} />
        </div>
      ))}

      {/* Background toggle */}
      {bgPapers.length > 0 && (
        <div
          className="bg-toggle"
          style={{ position: 'absolute', top: toggleY, left: 0 }}
          onClick={() => onToggleBg(block.id)}
        >
          {showBg ? `▲ Hide ${bgPapers.length} background papers` : `▼ Show ${bgPapers.length} background papers`}
        </div>
      )}

      {/* Background papers */}
      {showBg && bgItems.map(({ paper, y }) => (
        <div key={paper.id} style={{ position: 'absolute', top: y + 46, left: 0 }}>
          <PaperCard paper={paper} block={block} onSelect={onSelect} />
        </div>
      ))}
    </div>
  );
}

// ── Contribution node ──────────────────────────────────────────────
function ContributionNode() {
  return (
    <div className="contrib-node" style={{ position: 'absolute', left: CONTRIB_X, top: HEADER_Y }}>
      <div className="contrib-header">
        <div className="contrib-title">★ ENTERPRISE STORY + ALiEn</div>
        <div className="contrib-subtitle">
          A versioned, machine-addressable organizational mandate artifact — the computable constitution AI agents reference at runtime, and governance actors inspect, adjudicate against, and update.
        </div>
      </div>
      <div className="contrib-body">
        <div className="actor-node">
          <div className="actor-header">🏛️ ARCHITECT</div>
          <div className="actor-desc">Authors and proposes Story version updates. Cannot activate unilaterally. Submits Ratification Proposals → Human Governance Owner.</div>
        </div>
        <div className="contrib-arrow">↕</div>
        <div className="actor-node">
          <div className="actor-header">👁️ SENTINEL</div>
          <div className="actor-desc">Monitors production behavior continuously. Produces Evidence Packets linked to Story clauses → Oracle.</div>
        </div>
        <div className="contrib-arrow">↕</div>
        <div className="actor-node">
          <div className="actor-header">⚖️ ORACLE</div>
          <div className="actor-desc">Calibrates autonomy posture. Reversible intervention ladder. Escalates to Human Governance Owner when threshold exceeded.</div>
        </div>
        <div className="contrib-arrow">↕</div>
        <div className="actor-node">
          <div className="actor-header">👤 HUMAN GOVERNANCE OWNER</div>
          <div className="actor-desc">Constitutional ratification authority. Approves Story changes. Ratifies → Enterprise Story. Receives Oracle escalations.</div>
        </div>
      </div>
    </div>
  );
}

// ── Side panel ─────────────────────────────────────────────────────
function SidePanel({ selection, onClose }) {
  const { paper, block } = selection;
  return (
    <div className="side-panel">
      <button className="panel-close" onClick={onClose}>✕ Close</button>

      <div className="panel-block-tag" style={{ background: block.color + '33', color: block.borderColor, border: `1px solid ${block.borderColor}55` }}>
        {block.title} — {block.subtitle}
      </div>

      {paper.star && <div className="panel-star">{paper.star}</div>}

      <div className="panel-title">{paper.title}</div>
      <div className="panel-meta">
        {paper.authors}, {paper.year} · <em>{paper.journal}</em>
      </div>

      <div className="panel-divider" />

      <div className="panel-section">
        <div className="panel-section-label">▸ What it says</div>
        <div className="panel-section-text">{paper.what}</div>
      </div>
      <div className="panel-section">
        <div className="panel-section-label">▸ How it connects</div>
        <div className="panel-section-text">{paper.how}</div>
      </div>
      <div className="panel-section">
        <div className="panel-section-label">▸ Why here</div>
        <div className="panel-section-text">{paper.why}</div>
      </div>

      <div className="panel-divider" />
      <div style={{ fontSize: 9, color: '#555', fontStyle: 'italic', textAlign: 'center' }}>
        Tier: {paper.tier.charAt(0).toUpperCase() + paper.tier.slice(1)}
        {paper.crossRef ? ' · Cross-referenced in argument spine' : ''}
      </div>
    </div>
  );
}

// ── Legend ─────────────────────────────────────────────────────────
function Legend() {
  return (
    <div className="legend">
      <div className="legend-title">Map Key</div>
      {BLOCKS.map(b => (
        <div key={b.id} className="legend-row">
          <div className="legend-dot" style={{ background: b.color }} />
          <span>{b.title} — {b.subtitle.split(' ').slice(0,3).join(' ')}…</span>
        </div>
      ))}
      <div className="legend-row">
        <div className="legend-dot" style={{ background: '#B8860B' }} />
        <span>Proposed Contribution (ALiEn)</span>
      </div>
      <div style={{ height: 6 }} />
      <div className="legend-row">
        <div style={{ width: 20, height: 2, background: 'rgba(255,255,255,0.4)' }} />
        <span>Block transition arrows</span>
      </div>
      <div className="legend-row">
        <div style={{ width: 20, height: 2, background: '#FFA500', borderTop: '1px dashed #FFA500' }} />
        <span>Cross-block theoretical links</span>
      </div>
      <div className="legend-row">
        <div style={{ width: 14, height: 14, border: '1.5px solid #B8860B', borderRadius: 3, boxShadow: '0 0 5px #B8860B55' }} />
        <span>Core / anchor paper</span>
      </div>
      <div style={{ fontSize: 9, color: '#444', marginTop: 6, fontStyle: 'italic' }}>
        Click any card to expand details
      </div>
    </div>
  );
}

// ── Main app ───────────────────────────────────────────────────────
function App() {
  const [selected, setSelected] = useState(null);
  const [showBg, setShowBg] = useState({});
  const [transform, setTransform] = useState({ x: 0, y: 0, scale: 0.48 });
  const [dragging, setDragging] = useState(false);
  const dragRef = useRef(null);
  const wrapRef = useRef(null);

  // Centre map on load
  useEffect(() => {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    setTransform({ x: vw * 0.02, y: vh * 0.04, scale: 0.46 });
  }, []);

  const { pos } = useMemo(() => computePositions(showBg), [showBg]);

  // Compute canvas height
  const canvasHeight = useMemo(() => {
    let maxH = 200;
    BLOCKS.forEach((block, bi) => {
      let y = PAPERS_START;
      ['core','strong','background'].forEach(tier => {
        const papers = block.papers.filter(p => p.tier === tier);
        const h = tier === 'core' ? CORE_H : tier === 'strong' ? STRONG_H : BG_H;
        const show = tier !== 'background' || showBg[block.id];
        if (show) y += papers.length * (h + CARD_GAP) + TIER_GAP;
        else if (tier === 'background' && papers.length > 0) y += 46;
      });
      maxH = Math.max(maxH, y + 40);
    });
    return maxH + 60;
  }, [showBg]);

  // Pan
  const onMouseDown = useCallback((e) => {
    if (e.target.closest('.paper-card') || e.target.closest('.side-panel') ||
        e.target.closest('.toolbar') || e.target.closest('.legend') ||
        e.target.closest('.bg-toggle') || e.target.closest('.contrib-node')) return;
    dragRef.current = { startX: e.clientX, startY: e.clientY, tx: transform.x, ty: transform.y };
    setDragging(true);
  }, [transform]);

  const onMouseMove = useCallback((e) => {
    if (!dragRef.current) return;
    setTransform(t => ({
      ...t,
      x: dragRef.current.tx + (e.clientX - dragRef.current.startX),
      y: dragRef.current.ty + (e.clientY - dragRef.current.startY),
    }));
  }, []);

  const onMouseUp = useCallback(() => {
    dragRef.current = null;
    setDragging(false);
  }, []);

  // Zoom
  const onWheel = useCallback((e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.91;
    const rect = wrapRef.current.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    setTransform(t => {
      const newScale = Math.max(0.18, Math.min(2.2, t.scale * factor));
      return {
        scale: newScale,
        x: mx - (mx - t.x) * (newScale / t.scale),
        y: my - (my - t.y) * (newScale / t.scale),
      };
    });
  }, []);

  const zoomTo = (scale) => {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    setTransform({ x: vw * 0.02, y: vh * 0.04, scale });
  };

  const toggleBg = (blockId) => {
    setShowBg(prev => ({ ...prev, [blockId]: !prev[blockId] }));
  };

  return (
    <div
      ref={wrapRef}
      className={`canvas-wrapper${dragging ? ' dragging' : ''}`}
      onMouseDown={onMouseDown}
      onMouseMove={onMouseMove}
      onMouseUp={onMouseUp}
      onMouseLeave={onMouseUp}
      onWheel={onWheel}
    >
      {/* Canvas */}
      <div
        className="canvas"
        style={{
          width: CANVAS_W,
          height: canvasHeight,
          transform: `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`,
        }}
      >
        {/* SVG connection layer */}
        <svg
          style={{ position: 'absolute', top: 0, left: 0, width: CANVAS_W, height: canvasHeight, pointerEvents: 'none', overflow: 'visible' }}
        >
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>
          <Connections pos={pos} showBg={showBg} />
        </svg>

        {/* Block columns */}
        {BLOCKS.map((block, i) => (
          <BlockColumn
            key={block.id}
            block={block}
            colIdx={i}
            onSelect={setSelected}
            showBg={showBg[block.id] || false}
            onToggleBg={toggleBg}
          />
        ))}

        {/* Contribution node */}
        <ContributionNode />

        {/* Watermark */}
        <div className="watermark" style={{ bottom: 18, position: 'absolute', width: CANVAS_W }}>
          DBA Literature Review — Grenoble École de Management — RQ: How do enterprises ensure AI agents act in line with organizational mandate?
        </div>
      </div>

      {/* UI overlays */}
      <Legend />

      {selected && (
        <SidePanel selection={selected} onClose={() => setSelected(null)} />
      )}

      {/* Toolbar */}
      <div className="toolbar">
        <button className="toolbar-btn" onClick={() => zoomTo(0.32)}>Overview</button>
        <div className="toolbar-sep" />
        <button className="toolbar-btn" onClick={() => setTransform(t => ({ ...t, scale: Math.max(0.18, t.scale * 0.83) }))}>−</button>
        <div className="toolbar-zoom">{Math.round(transform.scale * 100)}%</div>
        <button className="toolbar-btn" onClick={() => setTransform(t => ({ ...t, scale: Math.min(2.2, t.scale * 1.2) }))}>+</button>
        <div className="toolbar-sep" />
        <button className="toolbar-btn" onClick={() => zoomTo(0.9)}>Full Size</button>
        <div className="toolbar-sep" />
        {BLOCKS.map(b => (
          <button key={b.id} className="toolbar-btn"
            style={{ borderLeft: `3px solid ${b.color}`, fontSize: 11 }}
            onClick={() => {
              const vw = window.innerWidth;
              setTransform({ x: -(COL_STARTS[b.colIdx] * 0.7) + vw * 0.08, y: 30, scale: 0.7 });
            }}>
            {b.title}
          </button>
        ))}
        <button className="toolbar-btn"
          style={{ borderLeft: '3px solid #B8860B', fontSize: 11 }}
          onClick={() => setTransform({ x: -(CONTRIB_X * 0.7) + window.innerWidth * 0.08, y: 30, scale: 0.7 })}>
          ALiEn ★
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
